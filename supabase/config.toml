
[functions.submit-feedback]
enabled = true
# verify_jwt must be false so Supabase doesn't block the CORS OPTIONS preflight
# (no JWT is sent on preflight requests). Auth is enforced inside the function
# via supabase.auth.getUser() — unauthenticated POST requests get a 401.
verify_jwt = false
import_map = "./functions/submit-feedback/deno.json"
entrypoint = "./functions/submit-feedback/index.ts"

[functions.google-token-exchange]
enabled = true
verify_jwt = true
import_map = "./functions/google-token-exchange/deno.json"
# Uncomment to specify a custom file path to the entrypoint.
# Supported file extensions are: .ts, .js, .mjs, .jsx, .tsx
entrypoint = "./functions/google-token-exchange/index.ts"
# Specifies static files to be bundled with the function. Supports glob patterns.
# For example, if you want to serve static HTML pages in your function:
# static_files = [ "./functions/google-token-exchange/*.html" ]
